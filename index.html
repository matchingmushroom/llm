<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#1A3B5C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <title>Behind Schedule | Overdue Report View System</title>
  <style>
    /* ====== EXISTING STYLES (keep all your styles) ====== */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --primary: #1A3B5C; --primary-light: #2A5A8C; --accent-gold: #C9A227;
      --bg-light: #F4F7FC; --surface-white: #FFFFFF; --text-primary: #0A1929;
      --text-muted: #5A6E8A; --border-light: #E2E8F0; --danger: #E53E3E;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04); --radius-lg: 18px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg-light); margin: 0; padding-bottom: 84px; }
    .hidden { display: none !important; }
    .content { padding: 0 20px; max-width: 1280px; margin: 0 auto; }
    header { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); padding: 16px 24px; position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .app-title { font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--primary-light)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .dashboard-icon { cursor: pointer; padding: 8px 16px; background: rgba(26,59,92,0.04); border-radius: 40px; display: flex; align-items: center; gap: 6px; }
    .customer-header { background: white; border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow-sm); }
    .name-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .cust-name { font-size: 28px; font-weight: 700; margin: 0; }
    .inline-status { display: flex; gap: 8px; }
    .st-icon { padding: 4px 12px; border-radius: 40px; font-size: 12px; font-weight: 600; }
    .st-act-pass { background: #0B753D; color: white; }
    .st-act-wl { background: #F5A623; color: black; }
    .st-act-npa { background: #E53E3E; color: white; }
    .st-prob-pass { background: #6EBA9A; }
    .st-prob-wl { background: #FCE3A4; }
    .st-prob-npa { background: #F5A0A0; }
    .header-actions { display: flex; gap: 12px; margin-left: auto; }
    .action-icon { cursor: pointer; padding: 8px; background: #f0f0f0; border-radius: 30px; }
    .group-badge { background: rgba(26,59,92,0.06); padding: 6px 14px; border-radius: 40px; cursor: pointer; }
    .grid-summary { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: white; border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-sm); }
    .stat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .stat-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
    .stat-value { font-size: 24px; font-weight: 800; }
    .table-wrapper { overflow-x: auto; background: white; border-radius: var(--radius-lg); }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th, td { padding: 14px; text-align: left; border-bottom: 1px solid var(--border-light); }
    th { background: #F8FAFD; font-weight: 700; }
    .search-input { width: 100%; padding: 16px 20px; border-radius: 60px; border: 1px solid var(--border-light); font-size: 16px; }
    .search-result-item { background: white; border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px; cursor: pointer; display: flex; justify-content: space-between; box-shadow: var(--shadow-sm); }
    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid var(--border-light); padding: 8px 0; z-index: 20; }
    .nav-item { flex: 1; text-align: center; cursor: pointer; font-size: 12px; color: var(--text-muted); }
    .nav-item.active { color: var(--primary); font-weight: 600; }
    .filter-chip { background: #F0F4FA; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
    .filter-chip.active { background: var(--primary); color: white; }
    .pagination { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
    .pagination button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; }
    #loader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .spinner { width: 40px; height: 40px; border: 3px solid #ddd; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .offline-banner { background: var(--danger); color: white; text-align: center; padding: 8px; font-size: 12px; }
    .reminder-modal, .share-modal, .modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .reminder-box, .share-box, .modal-content {
      background: white; border-radius: 24px; padding: 24px;
      width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto;
    }
    .btn-primary { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; }
    @media (max-width: 640px) { .grid-summary { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>
<div id="loader" class="hidden"><div class="spinner"></div></div>
<div id="offlineBanner" class="offline-banner hidden">⚠️ You are offline. Showing cached data.</div>

<header>
  <div class="app-title">🏦 Behind Schedule</div>
  <div class="dashboard-icon" onclick="openDashboard()">📊 Dashboard</div>
</header>

<main>
  <!-- Search View -->
  <div id="view-search" class="view">
    <div style="padding:20px;"><input type="text" id="searchInp" class="search-input" placeholder="🔍 Search by name or CIF..."></div>
    <div id="results" class="content"></div>
  </div>

  <!-- Detail View -->
  <div id="view-detail" class="view hidden">
    <div class="content" style="padding-top:20px;">
      <div class="customer-header">
        <div class="name-row">
          <h2 id="det-name" class="cust-name"></h2>
          <div id="det-status" class="inline-status"></div>
          <div class="header-actions">
            <span class="action-icon" onclick="openShareModal()">📤</span>
            <span class="action-icon" onclick="openReminderPopup()">🔔</span>
            <span class="action-icon" onclick="openGPSModal()" title="GPS Locations">🌐</span>
          </div>
        </div>
        <div class="header-sub" style="margin-top:12px;">
          <div id="det-id" class="cust-id"></div>
          <div id="det-group-tag" class="group-badge" onclick="navTo('group')"></div>
        </div>
      </div>
      <div class="grid-summary" id="summary-cards"></div>
      <div class="section-title"><strong>📞 Contact Information</strong></div>
      <div class="grid-summary" id="contact-grid"></div>
      <div class="section-title"><strong>💰 Loan Portfolio</strong></div>
      <div class="table-wrapper" id="loan-table"></div>
    </div>
  </div>

  <!-- Group View -->
  <div id="view-group" class="view hidden">
    <div class="content" id="group-content" style="padding-top:20px;"></div>
  </div>

  <!-- Insights View -->
  <div id="view-insights" class="view hidden">
    <div class="content" id="insights-content" style="padding-top:20px;"></div>
  </div>
</main>

<nav class="bottom-nav">
  <div class="nav-item active" id="n-search" onclick="navTo('search')">🔍 Search</div>
  <div class="nav-item" id="n-detail" onclick="navTo('detail')">📋 Summary</div>
  <div class="nav-item" id="n-group" onclick="navTo('group')">👥 Group</div>
  <div class="nav-item" id="n-insights" onclick="navTo('insights')">📈 Insights</div>
</nav>

<!-- Share Modal -->
<div id="shareModal" class="share-modal">
  <div class="share-box">
    <div class="share-title">📤 Share Account Details</div>
    <textarea id="sharePreview" rows="3" readonly style="width:100%; margin:10px 0;"></textarea>
    <div style="display:flex; gap:10px;">
      <button class="btn-primary" onclick="copyAccountInfo()">Copy</button>
      <button class="btn-primary" onclick="shareViaWhatsApp()">WhatsApp</button>
      <button class="btn-primary" onclick="shareViaSMS()">SMS</button>
    </div>
    <button class="btn-primary" style="margin-top:10px; background:#6c757d;" onclick="closeShareModal()">Close</button>
  </div>
</div>

<!-- Reminder Modal -->
<div id="reminderModal" class="reminder-modal">
  <div class="reminder-box">
    <div class="rem-title">📨 Send Reminder</div>
    <select id="remLang" style="width:100%; padding:8px; margin:10px 0;"><option value="EN">English</option><option value="NP">Nepali</option></select>
    <select id="remContact" style="width:100%; padding:8px; margin:10px 0;"><option value="primary">Primary Contact</option><option value="secondary">Additional Contact</option></select>
    <textarea id="remPreview" rows="3" readonly style="width:100%; margin:10px 0;"></textarea>
    <div style="display:flex; gap:10px;">
      <button class="btn-primary" onclick="copyReminder()">Copy</button>
      <button class="btn-primary" onclick="sendWhatsAppReminder()">WhatsApp</button>
      <button class="btn-primary" onclick="sendSMSReminder()">SMS</button>
    </div>
    <button class="btn-primary" style="margin-top:10px; background:#6c757d;" onclick="closeReminder()">Close</button>
  </div>
</div>

<!-- GPS Modal -->
<div id="gpsModal" class="modal">
  <div class="modal-content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h3 style="margin:0;">📍 GPS Locations</h3>
      <button onclick="closeGpsModal()" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
    </div>
    <div id="gpsChipsList" style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px;"></div>
    <div id="gpsAddBtn" style="text-align:center; margin-bottom:20px;"></div>
    <div id="gpsForm" style="display:none; border-top:1px solid #ddd; padding-top:16px;">
      <label>Location Type</label>
      <select id="gpsType" style="width:100%; padding:8px; margin:8px 0;">
        <option value="Residence">🏠 Residence</option>
        <option value="Business">💼 Business</option>
        <option value="Collateral">🏢 Collateral</option>
      </select>
      <div id="gpsCollateralGroup" style="display:none;">
        <label>Custom Name</label>
        <input type="text" id="gpsCustomName" placeholder="e.g., Village Home, Plot 123" style="width:100%; padding:8px; margin:8px 0;">
      </div>
      <button id="gpsGetLocationBtn" class="btn-primary" style="background:#1A3B5C; margin-right:8px;">📍 Get Current Location</button>
      <button id="gpsSaveBtn" class="btn-primary" style="background:#28a745;">💾 Save</button>
      <button id="gpsCancelBtn" class="btn-primary" style="background:#6c757d;">Cancel</button>
      <div id="gpsStatusMsg" style="margin-top:8px; font-size:14px; color:#666;"></div>
    </div>
  </div>
</div>

<script>
  // ========== CONFIGURATION ==========
  // Replace with your actual Apps Script URL
  const API_BASE = 'https://script.google.com/macros/s/AKfycbyrxcebHInHzikp7xlgV1b1fXYuGSIn3_panIMwX_XqnjTWqjcR5wSVW13MzLWNGvk/exec';
  
  // ========== PWA SERVICE WORKER ==========
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(err => console.error('SW error:', err));
    });
  }
  
  // ========== BACKEND CALLER ==========
  async function callBackend(action, params = {}) {
    const url = new URL(API_BASE);
    url.searchParams.append('action', action);
    for (let [k, v] of Object.entries(params)) {
      if (v !== undefined && v !== null) {
        if (Array.isArray(v)) url.searchParams.append(k, JSON.stringify(v));
        else url.searchParams.append(k, v);
      }
    }
    const resp = await fetch(url.toString());
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    return data;
  }
  
  // ========== OFFLINE & CACHING ==========
  const STORAGE_KEYS = { CUSTOMERS: 'crm_customers', METRICS: 'crm_metrics_', GROUPS: 'crm_groups_' };
  function cacheCustomerList(list) { try { localStorage.setItem(STORAGE_KEYS.CUSTOMERS, JSON.stringify(list)); } catch(e) {} }
  function getCachedCustomerList() { const d = localStorage.getItem(STORAGE_KEYS.CUSTOMERS); return d ? JSON.parse(d) : []; }
  function cacheMetrics(cif, data) { localStorage.setItem(STORAGE_KEYS.METRICS + cif, JSON.stringify(data)); }
  function getCachedMetrics(cif) { const d = localStorage.getItem(STORAGE_KEYS.METRICS + cif); return d ? JSON.parse(d) : null; }
  function cacheGroup(name, data) { localStorage.setItem(STORAGE_KEYS.GROUPS + name, JSON.stringify(data)); }
  function getCachedGroup(name) { const d = localStorage.getItem(STORAGE_KEYS.GROUPS + name); return d ? JSON.parse(d) : null; }
  
  let customers = [], currentCIF = null, currentGroup = "";
  window.currentCustomer = { name: '', account: '', renewal: '', primaryPhone: '', secondaryPhone: '' };
  const fAmt = (n) => '₹ ' + (Math.abs(n) <= 0.0001 ? "0.00" : Number(n).toLocaleString('en-IN', {minimumFractionDigits:2}));
  const toggleLoader = (show) => document.getElementById('loader').classList.toggle('hidden', !show);
  
  // ========== CUSTOMER LIST ==========
  async function loadCustomerList() {
    const cached = getCachedCustomerList();
    if (cached.length) { customers = cached; setupSearch(); }
    if (navigator.onLine) {
      try {
        const data = await callBackend('customers');
        customers = data;
        cacheCustomerList(data);
        setupSearch();
      } catch(e) { console.error(e); if(!customers.length) alert('Failed to load customers'); }
    } else if (!customers.length) alert('Offline and no cached customers');
  }
  function setupSearch() {
    const inp = document.getElementById('searchInp');
    inp.oninput = () => {
      const val = inp.value.toUpperCase();
      if (!val) { renderSearchResults([]); return; }
      const filtered = customers.filter(c => c.name.toUpperCase().includes(val) || c.id.includes(val)).slice(0,12);
      renderSearchResults(filtered);
    };
  }
  function renderSearchResults(list) {
    const container = document.getElementById('results');
    container.innerHTML = list.map(c => `<div class="search-result-item" data-cif="${c.id}"><div><strong>${c.name}</strong><br><small>CIF: ${c.id}</small></div><span>➡️</span></div>`).join('');
    document.querySelectorAll('.search-result-item').forEach(el => {
      el.addEventListener('click', () => { currentCIF = el.dataset.cif; navTo('detail'); });
    });
  }
  
  // ========== NAVIGATION ==========
  function navTo(view) {
    if(view === 'group' && (!currentGroup || currentGroup.toUpperCase() === "NO GROUP")) { alert("No group info."); return; }
    if(view !== 'search' && !currentCIF) { alert("Select a customer first."); return; }
    document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`view-${view}`).classList.remove('hidden');
    document.getElementById(`n-${view}`).classList.add('active');
    if(view === 'detail') loadDetails();
    if(view === 'group') loadGroupDetails();
    if(view === 'insights') loadInsights();
  }
  
  // ========== DETAILS ==========
  async function loadDetails() {
    const cached = getCachedMetrics(currentCIF);
    if (cached) renderMetrics(cached);
    else toggleLoader(true);
    if (navigator.onLine) {
      try {
        const m = await callBackend('metrics', { cifId: currentCIF });
        toggleLoader(false);
        renderMetrics(m);
        cacheMetrics(currentCIF, m);
      } catch(e) { toggleLoader(false); if(!cached) alert('Failed to load details'); }
    } else { toggleLoader(false); if(!cached) alert('Offline and no cached data'); }
  }
  function renderMetrics(m) {
    document.getElementById('det-name').innerText = m.CUSTOMER_NAME;
    document.getElementById('det-id').innerHTML = "🆔 CIF: "+m.CIF_ID;
    currentGroup = (m.CUSTOMER_GROUP || "NO GROUP").trim();
    const hasGroup = currentGroup.toUpperCase() !== "NO GROUP";
    const groupElem = document.getElementById('det-group-tag');
    if(hasGroup) { groupElem.innerHTML = `👥 ${currentGroup}`; groupElem.style.display = 'inline-flex'; }
    else groupElem.style.display = 'none';
    document.getElementById('det-status').innerHTML = getStatusIcons(m.CATEGORY_ACTUAL, m.CATEGORY_PROBABLE);
    document.getElementById('v-net-ovd').innerHTML = fAmt(m.TOTAL_OVERDUE_NET);
    document.getElementById('v-tot-ovd').innerHTML = fAmt(m.TOT_OVD_AMT);
    document.getElementById('v-npa').innerHTML = fAmt(m.MIN_BAL_NPA);
    document.getElementById('v-wl').innerHTML = fAmt(m.MIN_BAL_WL);
    document.getElementById('v-loan').innerHTML = fAmt(m.OUTSTANDING_LOAN);
    document.getElementById('v-op').innerHTML = fAmt(m.OP_BALANCE);
    document.getElementById('v-days').innerHTML = m.MAX_OVD_DAYS;
    document.getElementById('v-renewal').innerHTML = m.RENEWAL;
    document.querySelector("#tbl-loan tbody").innerHTML = m.accounts.map(a => `<tr><td><strong>${a.SCHEME}</strong><br><small>${a.ACCOUNT_NO}</small></td><td>${fAmt(a.OUTSTANDING_LOAN)}</td><td>${a.FULL_RATE}%</td><td>${fAmt(a.MIN_BAL_NPA)}</td><td>${fAmt(a.MIN_BAL_WL)}</td><td style="color:red">${fAmt(a.NET_OVD)}</td>`).join('');
    window.currentCustomer.name = m.CUSTOMER_NAME;
    window.currentCustomer.renewal = m.RENEWAL;
    if (navigator.onLine) {
      callBackend('extraDetails', { cifId: currentCIF }).then(c => {
        if(c) {
          window.currentCustomer.account = c.OP_ACCOUNT || '-';
          window.currentCustomer.primaryPhone = (c.Contact_No || '').split(';')[0]?.trim() || '';
          window.currentCustomer.secondaryPhone = (c.Additional_Contact_Number || '').split(';')[0]?.trim() || '';
          document.getElementById('contact-grid').innerHTML = `<div class="stat-card"><div class="stat-label">Primary</div>${c.Contact_Person_Name || '-'}<br>${c.Contact_No || '-'}</div><div class="stat-card"><div class="stat-label">Secondary</div>${c.Additional_Person || '-'}<br>${c.Additional_Contact_Number || '-'}</div>`;
        } else document.getElementById('contact-grid').innerHTML = '<div class="stat-card">No contact info</div>';
      }).catch(() => document.getElementById('contact-grid').innerHTML = '<div class="stat-card">Contact unavailable</div>');
    } else document.getElementById('contact-grid').innerHTML = '<div class="stat-card">Offline - no contact</div>';
  }
  function getStatusIcons(actual, probable) {
    actual = (actual||'').toUpperCase(); probable = (probable||'').toUpperCase();
    let actCls = 'st-act-pass'; if(actual.includes('NPA')) actCls='st-act-npa'; else if(actual.includes('WL')) actCls='st-act-wl';
    let probCls = 'st-prob-pass'; if(probable.includes('PNPA')) probCls='st-prob-npa'; else if(probable.includes('PWL')) probCls='st-prob-wl';
    return `<div class="st-icon ${actCls}">${actual}</div><div class="st-icon ${probCls}">${probable}</div>`;
  }
  
  // ========== GROUP ==========
  async function loadGroupDetails() {
    if(!currentGroup || currentGroup.toUpperCase()==="NO GROUP") { document.getElementById('group-content').innerHTML='<div class="group-card">No group</div>'; return; }
    const cached = getCachedGroup(currentGroup);
    if (cached) renderGroup(cached);
    else toggleLoader(true);
    if (navigator.onLine) {
      try {
        const d = await callBackend('group', { groupName: currentGroup });
        toggleLoader(false);
        renderGroup(d);
        cacheGroup(currentGroup, d);
      } catch(e) { toggleLoader(false); if(!cached) alert('Group load failed'); }
    } else { toggleLoader(false); if(!cached) alert('Offline and no cached group'); }
  }
  function renderGroup(d) {
    let html = `<div class="group-card"><div><strong>${d.summary.groupName}</strong><br>Units: ${d.summary.unitCount}<br>Total Loan: ${fAmt(d.summary.totalLoan)}<br>Net Overdue: ${fAmt(d.summary.totalNetOvd)}</div>`;
    d.units.forEach(u => { html += `<div class="stat-card"><strong>${u.name}</strong><br>Net Overdue: ${fAmt(u.totalNetOvd)}</div>`; });
    document.getElementById('group-content').innerHTML = html;
  }
  
  // ========== INSIGHTS ==========
  async function loadInsights() {
    toggleLoader(true);
    try {
      const ovd = await callBackend('overdue', { cifId: currentCIF });
      document.getElementById('insights-content').innerHTML = `<h3>Overdue by Date</h3><ul>${ovd.rows.map(r => `<li>${r.OVD_DATE}: ${fAmt(r.TOT_OVD_AMT)}</li>`).join('')}</ul><strong>Total: ${fAmt(ovd.total.TOT_OVD_AMT)}</strong>`;
    } catch(e) { document.getElementById('insights-content').innerHTML = '<div>Error loading insights</div>'; }
    toggleLoader(false);
  }
  
  // ========== DASHBOARD ==========
  function openDashboard() { window.open(API_BASE + '?page=dashboard', '_blank'); }
  
  // ========== SHARE & REMINDER ==========
  function openShareModal() { if(!window.currentCustomer.name) { alert("Load customer first"); return; } document.getElementById('sharePreview').value = `Customer: ${window.currentCustomer.name}\nAccount: ${window.currentCustomer.account || 'N/A'}`; document.getElementById('shareModal').style.display = 'flex'; }
  function closeShareModal() { document.getElementById('shareModal').style.display = 'none'; }
  function copyAccountInfo() { navigator.clipboard.writeText(document.getElementById('sharePreview').value); alert('Copied'); closeShareModal(); }
  function shareViaWhatsApp() { window.open(`https://wa.me/?text=${encodeURIComponent(document.getElementById('sharePreview').value)}`, '_blank'); closeShareModal(); }
  function shareViaSMS() { window.location.href = `sms:?body=${encodeURIComponent(document.getElementById('sharePreview').value)}`; closeShareModal(); }
  function openReminderPopup() { document.getElementById('reminderModal').style.display = 'flex'; updatePreview(); }
  function closeReminder() { document.getElementById('reminderModal').style.display = 'none'; }
  function getReminderText(lang) { const isExpired = (window.currentCustomer.renewal||'').toUpperCase() === 'EXPIRED'; if(isExpired) return lang==='NP' ? 'कृपया बक्यौता र नवीकरण गर्नुहोस्' : 'Please clear dues and renew.'; return lang==='NP' ? 'कृपया भुक्तानी गर्नुहोस्' : 'Your payment is overdue.'; }
  function updatePreview() { document.getElementById('remPreview').value = getReminderText(document.getElementById('remLang').value); }
  function getSelectedPhone() { return document.getElementById('remContact').value === 'secondary' ? window.currentCustomer.secondaryPhone : window.currentCustomer.primaryPhone; }
  function copyReminder() { navigator.clipboard.writeText(document.getElementById('remPreview').value); alert('Copied'); }
  function sendWhatsAppReminder() { const phone = getSelectedPhone(); if(!phone) { alert('No phone'); return; } const clean = phone.replace(/[^0-9]/g,''); const full = clean.startsWith('977')?clean:'977'+clean; window.open(`https://wa.me/${full}?text=${encodeURIComponent(document.getElementById('remPreview').value)}`,'_blank'); }
  function sendSMSReminder() { const phone = getSelectedPhone(); if(!phone) { alert('No phone'); return; } window.location.href = `sms:${phone}?body=${encodeURIComponent(document.getElementById('remPreview').value)}`; }
  
  // ========== GPS MODAL ==========
  let gpsCurrentLat = null, gpsCurrentLng = null;
  let gpsEditingType = null, gpsEditingOldName = null;
  
  function openGPSModal() {
    if (!currentCIF) { alert("Select a customer first."); return; }
    console.log("Opening GPS modal for", currentCIF);
    document.getElementById('gpsModal').style.display = 'flex';
    loadGpsRecords();
  }
  function closeGpsModal() {
    document.getElementById('gpsModal').style.display = 'none';
    resetGpsForm();
  }
  async function loadGpsRecords() {
    toggleLoader(true);
    try {
      const records = await callBackend('getGPSData', { cifId: currentCIF });
      console.log("GPS records:", records);
      renderGpsChips(records);
    } catch(e) { console.error(e); document.getElementById('gpsChipsList').innerHTML = '<span style="color:red;">Failed to load</span>'; }
    toggleLoader(false);
  }
  function renderGpsChips(records) {
    const container = document.getElementById('gpsChipsList');
    const addBtn = document.getElementById('gpsAddBtn');
    if (!records || records.length === 0) {
      container.innerHTML = '<p>No saved locations.</p>';
    } else {
      let html = '';
      records.forEach(rec => {
        let icon = rec.type === 'Residence' ? '🏠' : (rec.type === 'Collateral' ? '🏢' : '💼');
        let label = rec.type === 'Collateral' ? `Collateral: ${rec.customName}` : rec.type;
        html += `<div style="background:#f0f2f5; border-radius:30px; padding:6px 12px; display:inline-flex; align-items:center; gap:8px;">
          <span>${icon}</span><span>${label}</span>
          <button onclick="openMap(${rec.lat},${rec.lng})" style="background:none; border:none; cursor:pointer;">🗺️</button>
          <button onclick="editGpsRecord('${rec.type}', '${rec.customName || ''}')" style="background:none; border:none; cursor:pointer;">✏️</button>
        </div>`;
      });
      container.innerHTML = html;
    }
    addBtn.innerHTML = '<button class="btn-primary" onclick="showGpsAddForm()">➕ Add Location</button>';
  }
  function openMap(lat, lng) { window.open(`https://www.google.com/maps?q=${lat},${lng}`, '_blank'); }
  function showGpsAddForm() { gpsEditingType = null; gpsEditingOldName = null; resetGpsForm(); document.getElementById('gpsForm').style.display = 'block'; }
  function editGpsRecord(type, customName) { gpsEditingType = type; gpsEditingOldName = customName; resetGpsForm(); document.getElementById('gpsType').value = type; document.getElementById('gpsCustomName').value = customName || ''; const showName = (type === 'Residence' || type === 'Collateral'); document.getElementById('gpsCollateralGroup').style.display = showName ? 'block' : 'none'; document.getElementById('gpsForm').style.display = 'block'; }
  function resetGpsForm() { document.getElementById('gpsType').value = 'Residence'; document.getElementById('gpsCustomName').value = ''; document.getElementById('gpsCollateralGroup').style.display = 'none'; document.getElementById('gpsStatusMsg').innerHTML = ''; gpsCurrentLat = null; gpsCurrentLng = null; }
  async function captureGpsLocation() {
    if (!navigator.geolocation) { document.getElementById('gpsStatusMsg').innerHTML = '❌ Not supported'; return; }
    document.getElementById('gpsStatusMsg').innerHTML = '📍 Fetching...';
    navigator.geolocation.getCurrentPosition(
      pos => { gpsCurrentLat = pos.coords.latitude; gpsCurrentLng = pos.coords.longitude; document.getElementById('gpsStatusMsg').innerHTML = `✅ ${gpsCurrentLat.toFixed(6)}, ${gpsCurrentLng.toFixed(6)}`; },
      err => { document.getElementById('gpsStatusMsg').innerHTML = `❌ ${err.message}`; },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }
  async function saveGpsRecord() {
    const type = document.getElementById('gpsType').value;
    let customName = document.getElementById('gpsCustomName').value.trim();
    if ((type === 'Residence' || type === 'Collateral') && !customName) { alert('Please provide a name'); return; }
    if (gpsCurrentLat === null || gpsCurrentLng === null) { alert('Get current location first'); return; }
    try {
      if (gpsEditingType) {
        await callBackend('updateGPSRecord', { cifId: currentCIF, type: type, oldName: gpsEditingOldName, newName: customName, lat: gpsCurrentLat, lng: gpsCurrentLng });
        alert('Updated');
      } else {
        await callBackend('saveGPSRecord', { cifId: currentCIF, type: type, name: customName, lat: gpsCurrentLat, lng: gpsCurrentLng });
        alert('Saved');
      }
      closeGpsModal();
      loadGpsRecords();
    } catch(e) { alert('Save failed: ' + e.message); }
  }
  function initGpsEvents() {
    document.getElementById('gpsGetLocationBtn')?.addEventListener('click', captureGpsLocation);
    document.getElementById('gpsSaveBtn')?.addEventListener('click', saveGpsRecord);
    document.getElementById('gpsCancelBtn')?.addEventListener('click', () => { document.getElementById('gpsForm').style.display = 'none'; });
    document.getElementById('gpsType')?.addEventListener('change', function() { document.getElementById('gpsCollateralGroup').style.display = (this.value === 'Residence' || this.value === 'Collateral') ? 'block' : 'none'; });
  }
  
  // ========== INIT ==========
  window.onload = () => {
    loadCustomerList();
    initGpsEvents();
    console.log("App loaded");
  };
</script>
</body>
</html>
