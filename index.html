<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#1A3B5C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <title>Behind Schedule | Overdue Report View System</title>
  <style>
    /* ========== PREMIUM STYLES (same as your original) ========== */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --primary: #1A3B5C; --primary-light: #2A5A8C; --accent-gold: #C9A227;
      --bg-light: #F4F7FC; --surface-white: #FFFFFF; --text-primary: #0A1929;
      --text-muted: #5A6E8A; --border-light: #E2E8F0; --danger: #E53E3E;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04); --radius-lg: 18px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg-light); margin: 0; padding-bottom: 84px; }
    .hidden { display: none !important; }
    .content { padding: 0 20px; max-width: 1280px; margin: 0 auto; }
    header { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); padding: 16px 24px; position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .app-title { font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--primary-light)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .dashboard-icon { cursor: pointer; padding: 8px 16px; background: rgba(26,59,92,0.04); border-radius: 40px; display: flex; align-items: center; gap: 6px; }
    .customer-header { background: white; border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow-sm); }
    .name-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .cust-name { font-size: 28px; font-weight: 700; margin: 0; }
    .inline-status { display: flex; gap: 8px; }
    .st-icon { padding: 4px 12px; border-radius: 40px; font-size: 12px; font-weight: 600; }
    .st-act-pass { background: #0B753D; color: white; }
    .st-act-wl { background: #F5A623; color: black; }
    .st-act-npa { background: #E53E3E; color: white; }
    .st-prob-pass { background: #6EBA9A; }
    .st-prob-wl { background: #FCE3A4; }
    .st-prob-npa { background: #F5A0A0; }
    .header-actions { display: flex; gap: 12px; margin-left: auto; }
    .action-icon { cursor: pointer; padding: 8px; background: #f0f0f0; border-radius: 30px; }
    .group-badge { background: rgba(26,59,92,0.06); padding: 6px 14px; border-radius: 40px; cursor: pointer; }
    .grid-summary { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: white; border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-sm); }
    .stat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .stat-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
    .stat-value { font-size: 24px; font-weight: 800; }
    .table-wrapper { overflow-x: auto; background: white; border-radius: var(--radius-lg); }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th, td { padding: 14px; text-align: left; border-bottom: 1px solid var(--border-light); }
    th { background: #F8FAFD; font-weight: 700; }
    .search-input { width: 100%; padding: 16px 20px; border-radius: 60px; border: 1px solid var(--border-light); font-size: 16px; }
    .search-result-item { background: white; border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px; cursor: pointer; display: flex; justify-content: space-between; box-shadow: var(--shadow-sm); }
    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid var(--border-light); padding: 8px 0; z-index: 20; }
    .nav-item { flex: 1; text-align: center; cursor: pointer; font-size: 12px; color: var(--text-muted); }
    .nav-item.active { color: var(--primary); font-weight: 600; }
    #loader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .spinner { width: 40px; height: 40px; border: 3px solid #ddd; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .offline-banner { background: #F5A623; color: #1A1A1A; text-align: center; padding: 8px; font-size: 12px; }
    /* Modal styles */
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; border-radius: 24px; padding: 24px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px; }
    .form-select, .form-input { width: 100%; padding: 10px; border-radius: 12px; border: 1px solid var(--border-light); }
    .btn-primary { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; }
    .chip { display: inline-flex; align-items: center; background: #f0f2f5; border-radius: 30px; padding: 6px 12px; gap: 8px; margin: 5px; }
    @media (max-width: 640px) { .grid-summary { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>
<div id="loader" class="hidden"><div class="spinner"></div></div>
<div id="offlineBanner" class="offline-banner hidden">⚠️ You are offline. Showing cached data.</div>

<header>
  <div class="app-title">🏦 Behind Schedule</div>
  <div class="dashboard-icon" onclick="navTo('dashboard')">📊 Dashboard</div>
</header>

<main>
  <!-- Search View -->
  <div id="view-search" class="view">
    <div style="padding:20px;"><input type="text" id="searchInp" class="search-input" placeholder="🔍 Search by name or CIF..."></div>
    <div id="results" class="content"></div>
  </div>

  <!-- Detail View -->
  <div id="view-detail" class="view hidden">
    <div class="content" style="padding-top:20px;">
      <div class="customer-header">
        <div class="name-row">
          <h2 id="det-name" class="cust-name"></h2>
          <div id="det-status" class="inline-status"></div>
          <div class="header-actions">
            <span class="action-icon" onclick="openShareModal()">📤</span>
            <span class="action-icon" onclick="openReminderPopup()">🔔</span>
            <span class="action-icon" onclick="openGPSModal()">🌐</span>
          </div>
        </div>
        <div class="header-sub" style="margin-top:12px;">
          <div id="det-id" class="cust-id"></div>
          <div id="det-group-tag" class="group-badge" onclick="navTo('group')"></div>
        </div>
      </div>
      <div class="grid-summary" id="summary-cards"></div>
      <div class="section-title"><strong>📞 Contact Information</strong></div>
      <div class="grid-summary" id="contact-grid"></div>
      <div class="section-title"><strong>💰 Loan Portfolio</strong></div>
      <div class="table-wrapper" id="loan-table"></div>
    </div>
  </div>

  <!-- Group View -->
  <div id="view-group" class="view hidden">
    <div class="content" id="group-content" style="padding-top:20px;"></div>
  </div>

  <!-- Insights View -->
  <div id="view-insights" class="view hidden">
    <div class="content" id="insights-content" style="padding-top:20px;"></div>
  </div>

  <!-- Dashboard View (hidden until navTo) -->
  <div id="view-dashboard" class="view hidden">
    <div class="content" id="dashboard-content" style="padding-top:20px;"></div>
  </div>
</main>

<nav class="bottom-nav">
  <div class="nav-item active" id="n-search" onclick="navTo('search')">🔍 Search</div>
  <div class="nav-item" id="n-detail" onclick="navTo('detail')">📋 Summary</div>
  <div class="nav-item" id="n-group" onclick="navTo('group')">👥 Group</div>
  <div class="nav-item" id="n-insights" onclick="navTo('insights')">📈 Insights</div>
</nav>

<!-- Share & Reminder Modals (unchanged) -->
<div id="shareModal" class="share-modal hidden"><div class="share-box">...</div></div>
<div id="reminderModal" class="reminder-modal hidden"><div class="reminder-box">...</div></div>

<!-- GPS MODAL (Popup) -->
<div id="gpsModal" class="modal">
  <div class="modal-content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h3 style="margin:0;">📍 GPS Location Manager</h3>
      <button onclick="closeGPSModal()" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
    </div>
    <!-- Dynamic chips container -->
    <div id="gpsChipsContainer" style="margin-bottom:20px;"></div>
    <div id="gpsAddBtnContainer" style="text-align:center; margin-bottom:20px;"></div>
    <!-- Add/Update Form -->
    <div id="gpsForm" style="display:none; border-top:1px solid #ddd; padding-top:16px;">
      <div class="form-group">
        <label class="form-label">Location Type</label>
        <select id="gpsType" class="form-select">
          <option value="Residence">🏠 Residence</option>
          <option value="Business">💼 Business</option>
          <option value="Collateral">🏢 Collateral</option>
        </select>
      </div>
      <div id="gpsCustomNameGroup" class="form-group" style="display:none;">
        <label class="form-label">Custom Name (e.g., Summer Home, Plot 123)</label>
        <input type="text" id="gpsCustomName" class="form-input" placeholder="Required for Residence/Collateral">
      </div>
      <div class="form-group">
        <label class="form-label">GPS Coordinates</label>
        <div style="display:flex; gap:10px;">
          <input type="text" id="gpsLat" class="form-input" placeholder="Latitude" readonly>
          <input type="text" id="gpsLng" class="form-input" placeholder="Longitude" readonly>
        </div>
        <button id="gpsCaptureBtn" class="btn-primary" style="margin-top:8px; width:100%;">📍 Capture Current GPS</button>
        <div id="gpsStatus" style="margin-top:8px; font-size:13px; color:#666;"></div>
      </div>
      <div style="display:flex; gap:10px; margin-top:16px;">
        <button id="gpsSaveBtn" class="btn-primary" style="flex:1;">💾 Save</button>
        <button id="gpsCancelFormBtn" class="btn-primary" style="background:#6c757d; flex:1;">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ========== CONFIGURATION ==========
  const API_BASE = window.location.origin + window.location.pathname; // Change if hosted separately
  const NEPALI_MONTHS = ["Baisakh","Jestha","Ashadh","Shrawan","Bhadra","Ashwin","Kartik","Mangsir","Poush","Magh","Falgun","Chaitra"];
  const fAmt = (n) => '₹ ' + (Math.abs(n) <= 0.0001 ? "0.00" : Number(n).toLocaleString('en-IN', {minimumFractionDigits:2}));
  const toggleLoader = (show) => document.getElementById('loader').classList.toggle('hidden', !show);

  let customers = [], currentCIF = null, currentGroup = "", slicerMeta = null;
  window.currentCustomer = { name: '', account: '', renewal: '', primaryPhone: '', secondaryPhone: '' };

  // ========== API CALLER ==========
  async function callBackend(action, params = {}) {
    const url = new URL(API_BASE);
    url.searchParams.append('action', action);
    for (let [k, v] of Object.entries(params)) {
      if (v !== undefined && v !== null) {
        if (Array.isArray(v)) url.searchParams.append(k, JSON.stringify(v));
        else url.searchParams.append(k, v);
      }
    }
    const resp = await fetch(url.toString());
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    return data;
  }

  // ========== OFFLINE & CACHING (simplified) ==========
  const STORAGE_KEYS = { CUSTOMERS: 'crm_customers', METRICS: 'crm_metrics_', GROUPS: 'crm_groups_' };
  function cacheCustomerList(list) { try { localStorage.setItem(STORAGE_KEYS.CUSTOMERS, JSON.stringify(list)); } catch(e) {} }
  function getCachedCustomerList() { const d = localStorage.getItem(STORAGE_KEYS.CUSTOMERS); return d ? JSON.parse(d) : []; }
  function cacheMetrics(cif, data) { localStorage.setItem(STORAGE_KEYS.METRICS + cif, JSON.stringify(data)); }
  function getCachedMetrics(cif) { const d = localStorage.getItem(STORAGE_KEYS.METRICS + cif); return d ? JSON.parse(d) : null; }
  function cacheGroup(name, data) { localStorage.setItem(STORAGE_KEYS.GROUPS + name, JSON.stringify(data)); }
  function getCachedGroup(name) { const d = localStorage.getItem(STORAGE_KEYS.GROUPS + name); return d ? JSON.parse(d) : null; }

  // ========== NAVIGATION ==========
  function navTo(view) {
    if(view === 'group' && (!currentGroup || currentGroup.toUpperCase() === "NO GROUP")) { alert("No group info."); return; }
    if(view !== 'search' && !currentCIF && view !== 'dashboard') { alert("Select a customer first."); return; }
    document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`view-${view}`)?.classList.remove('hidden');
    document.getElementById(`n-${view}`)?.classList.add('active');
    if(view === 'detail') loadDetails();
    if(view === 'group') loadGroupDetails();
    if(view === 'insights') loadInsights();
    if(view === 'dashboard') loadDashboard();
  }

  // ========== CUSTOMER LIST & SEARCH ==========
  async function loadCustomerList() {
    const cached = getCachedCustomerList();
    if (cached.length) { customers = cached; setupSearch(); }
    if (navigator.onLine) {
      try {
        const data = await callBackend('customers');
        customers = data;
        cacheCustomerList(data);
        setupSearch();
      } catch(e) { console.warn(e); if(!customers.length) alert('Failed to load customers'); }
    } else if (!customers.length) alert('Offline and no cached customers');
  }
  function setupSearch() {
    const inp = document.getElementById('searchInp');
    inp.oninput = () => {
      const val = inp.value.toUpperCase();
      if (!val) { renderSearchResults([]); return; }
      const filtered = customers.filter(c => c.name.toUpperCase().includes(val) || c.id.includes(val)).slice(0,12);
      renderSearchResults(filtered);
    };
  }
  function renderSearchResults(list) {
    const container = document.getElementById('results');
    container.innerHTML = list.map(c => `<div class="search-result-item" data-cif="${c.id}"><div><strong>${c.name}</strong><br><small>CIF: ${c.id}</small></div><span>➡️</span></div>`).join('');
    document.querySelectorAll('.search-result-item').forEach(el => {
      el.addEventListener('click', () => { currentCIF = el.dataset.cif; navTo('detail'); });
    });
  }

  // ========== DETAILS ==========
  async function loadDetails() {
    const cached = getCachedMetrics(currentCIF);
    if (cached) renderMetrics(cached);
    else toggleLoader(true);
    if (navigator.onLine) {
      try {
        const m = await callBackend('metrics', { cifId: currentCIF });
        toggleLoader(false);
        renderMetrics(m);
        cacheMetrics(currentCIF, m);
      } catch(e) { toggleLoader(false); if(!cached) alert('Failed to load details'); }
    } else { toggleLoader(false); if(!cached) alert('Offline and no cached data'); }
  }
  function renderMetrics(m) {
    document.getElementById('det-name').innerText = m.CUSTOMER_NAME;
    document.getElementById('det-id').innerHTML = "🆔 CIF: "+m.CIF_ID;
    currentGroup = (m.CUSTOMER_GROUP || "NO GROUP").trim();
    if(currentGroup.toUpperCase() !== "NO GROUP") {
      document.getElementById('det-group-tag').innerHTML = `👥 ${currentGroup}`;
      document.getElementById('det-group-tag').style.display = 'inline-flex';
    } else { document.getElementById('det-group-tag').style.display = 'none'; }
    document.getElementById('det-status').innerHTML = getStatusIcons(m.CATEGORY_ACTUAL, m.CATEGORY_PROBABLE);
    document.getElementById('v-net-ovd').innerHTML = fAmt(m.TOTAL_OVERDUE_NET);
    document.getElementById('v-tot-ovd').innerHTML = fAmt(m.TOT_OVD_AMT);
    document.getElementById('v-npa').innerHTML = fAmt(m.MIN_BAL_NPA);
    document.getElementById('v-wl').innerHTML = fAmt(m.MIN_BAL_WL);
    document.getElementById('v-loan').innerHTML = fAmt(m.OUTSTANDING_LOAN);
    document.getElementById('v-op').innerHTML = fAmt(m.OP_BALANCE);
    document.getElementById('v-days').innerHTML = m.MAX_OVD_DAYS;
    document.getElementById('v-renewal').innerHTML = m.RENEWAL;
    document.querySelector("#tbl-loan tbody").innerHTML = m.accounts.map(a => `<tr><td><strong>${a.SCHEME}</strong><br><small>${a.ACCOUNT_NO}</small></td><td>${fAmt(a.OUTSTANDING_LOAN)}</td><td>${a.FULL_RATE}%</div></td><td style="color:red">${fAmt(a.NET_OVD)}</td>`).join('');
    window.currentCustomer.name = m.CUSTOMER_NAME;
    window.currentCustomer.renewal = m.RENEWAL;
    if (navigator.onLine) {
      callBackend('extraDetails', { cifId: currentCIF }).then(c => {
        if(c) {
          window.currentCustomer.account = c.OP_ACCOUNT || '-';
          window.currentCustomer.primaryPhone = (c.Contact_No || '').split(';')[0]?.trim() || '';
          window.currentCustomer.secondaryPhone = (c.Additional_Contact_Number || '').split(';')[0]?.trim() || '';
          document.getElementById('contact-grid').innerHTML = `<div class="stat-card"><div class="stat-label">Primary</div>${c.Contact_Person_Name || '-'}<br>${c.Contact_No || '-'}</div><div class="stat-card"><div class="stat-label">Secondary</div>${c.Additional_Person || '-'}<br>${c.Additional_Contact_Number || '-'}</div>`;
        } else document.getElementById('contact-grid').innerHTML = '<div class="stat-card">No contact info</div>';
      }).catch(() => document.getElementById('contact-grid').innerHTML = '<div class="stat-card">Contact unavailable</div>');
    } else document.getElementById('contact-grid').innerHTML = '<div class="stat-card">Offline - no contact</div>';
  }
  function getStatusIcons(actual, probable) {
    actual = (actual||'').toUpperCase(); probable = (probable||'').toUpperCase();
    let actCls = 'st-act-pass'; if(actual.includes('NPA')) actCls='st-act-npa'; else if(actual.includes('WL')) actCls='st-act-wl';
    let probCls = 'st-prob-pass'; if(probable.includes('PNPA')) probCls='st-prob-npa'; else if(probable.includes('PWL')) probCls='st-prob-wl';
    return `<div class="st-icon ${actCls}">${actual}</div><div class="st-icon ${probCls}">${probable}</div>`;
  }

  // ========== GROUP ==========
  async function loadGroupDetails() {
    if(!currentGroup || currentGroup.toUpperCase()==="NO GROUP") { document.getElementById('group-content').innerHTML='<div class="stat-card">No group</div>'; return; }
    const cached = getCachedGroup(currentGroup);
    if (cached) renderGroup(cached);
    else toggleLoader(true);
    if (navigator.onLine) {
      try {
        const d = await callBackend('group', { groupName: currentGroup });
        toggleLoader(false);
        renderGroup(d);
        cacheGroup(currentGroup, d);
      } catch(e) { toggleLoader(false); if(!cached) alert('Group load failed'); }
    } else { toggleLoader(false); if(!cached) alert('Offline and no cached group'); }
  }
  function renderGroup(d) {
    let html = `<div class="stat-card"><strong>${d.summary.groupName}</strong><br>Units: ${d.summary.unitCount}<br>Total Loan: ${fAmt(d.summary.totalLoan)}<br>Net Overdue: ${fAmt(d.summary.totalNetOvd)}</div>`;
    d.units.forEach(u => { html += `<div class="stat-card"><strong>${u.name}</strong><br>Net Overdue: ${fAmt(u.totalNetOvd)}</div>`; });
    document.getElementById('group-content').innerHTML = html;
  }

  // ========== INSIGHTS ==========
  async function loadInsights() {
    toggleLoader(true);
    try {
      const ovd = await callBackend('overdue', { cifId: currentCIF });
      document.getElementById('insights-content').innerHTML = `<h3>Overdue by Date</h3><ul>${ovd.rows.map(r => `<li>${r.OVD_DATE}: ${fAmt(r.TOT_OVD_AMT)}</li>`).join('')}</ul><strong>Total: ${fAmt(ovd.total.TOT_OVD_AMT)}</strong>`;
    } catch(e) { document.getElementById('insights-content').innerHTML = '<div>Error loading insights</div>'; }
    toggleLoader(false);
  }

  // ========== DASHBOARD ==========
  let dashboardPage = 1, dashboardTotalPages = 1;
  async function loadDashboard() {
    toggleLoader(true);
    try {
      const data = await callBackend('customersByCategory', { category: 'ALL', relationship: 'ALL', sortBy: 'name', sortOrder: 'asc', page: dashboardPage, pageSize: 10 });
      let html = '<table><thead><tr><th>SN</th><th>Customer Name</th><th>Limit</th></tr></thead><tbody>';
      data.customers.forEach((c, i) => { html += `<tr data-cif="${c.cifId}"><td>${(dashboardPage-1)*10+i+1}</td><td style="color:var(--primary); cursor:pointer;">${c.name}</td><td>${fAmt(c.limit)}</td></tr>`; });
      html += `</tbody></table><div class="pagination"><button onclick="dashboardPrev()">Prev</button><span>Page ${dashboardPage} of ${data.totalPages}</span><button onclick="dashboardNext()">Next</button></div>`;
      document.getElementById('dashboard-content').innerHTML = html;
      dashboardTotalPages = data.totalPages;
      document.querySelectorAll('#dashboard-content tr[data-cif]').forEach(row => {
        row.addEventListener('click', () => { currentCIF = row.getAttribute('data-cif'); navTo('detail'); });
      });
    } catch(e) { document.getElementById('dashboard-content').innerHTML = '<div class="stat-card">Error loading dashboard</div>'; }
    toggleLoader(false);
  }
  function dashboardPrev() { if(dashboardPage>1) { dashboardPage--; loadDashboard(); } }
  function dashboardNext() { if(dashboardPage<dashboardTotalPages) { dashboardPage++; loadDashboard(); } }

  // ========== SHARE & REMINDER (Placeholder – can be restored) ==========
  function openShareModal() { alert("Share feature - implement as needed"); }
  function openReminderPopup() { alert("Reminder feature - implement as needed"); }

  // ========== GPS MODULE (Popup) ==========
  let gpsRecords = [];
  let gpsEditingType = null, gpsEditingOldName = null;
  let gpsCurrentLat = null, gpsCurrentLng = null;
  let gpsCurrentAccuracy = null;

  function openGPSModal() {
    if (!currentCIF) { alert("Select a customer first."); return; }
    document.getElementById('gpsModal').style.display = 'flex';
    loadGPSData();
  }
  function closeGPSModal() { document.getElementById('gpsModal').style.display = 'none'; resetGPSForm(); }

  async function loadGPSData() {
    toggleLoader(true);
    try {
      const records = await callBackend('getGPSData', { cifId: currentCIF });
      gpsRecords = records;
      renderGPSChips(records);
    } catch(e) { console.error(e); document.getElementById('gpsChipsContainer').innerHTML = '<span style="color:red;">Failed to load GPS data</span>'; }
    toggleLoader(false);
  }

  function renderGPSChips(records) {
    const container = document.getElementById('gpsChipsContainer');
    const addBtnContainer = document.getElementById('gpsAddBtnContainer');
    if (!records || records.length === 0) {
      container.innerHTML = '<p>No saved locations.</p>';
    } else {
      let chips = '';
      records.forEach(rec => {
        let icon = rec.type === 'Residence' ? '🏠' : (rec.type === 'Collateral' ? '🏢' : '💼');
        let label = rec.type === 'Collateral' ? `Collateral: ${rec.customName}` : rec.type;
        chips += `<div class="chip"><span>${icon}</span><span>${label}</span><button onclick="openMap(${rec.lat},${rec.lng})" style="background:none; border:none;">🗺️</button><button onclick="editGPSRecord('${rec.type}', '${rec.customName || ''}')" style="background:none; border:none;">✏️</button></div>`;
      });
      container.innerHTML = chips;
    }
    // Check if Business already exists
    const hasBusiness = records.some(r => r.type === 'Business');
    addBtnContainer.innerHTML = `<button class="btn-primary" onclick="showGPSAddForm()" ${hasBusiness ? 'disabled style="opacity:0.5;"' : ''}>➕ Add New Location</button>`;
  }

  function openMap(lat, lng) { window.open(`https://www.google.com/maps/search/?api=1&query=${lat},${lng}`, '_blank'); }

  function showGPSAddForm() {
    gpsEditingType = null;
    gpsEditingOldName = null;
    resetGPSForm();
    document.getElementById('gpsForm').style.display = 'block';
  }

  function editGPSRecord(type, customName) {
    gpsEditingType = type;
    gpsEditingOldName = customName;
    resetGPSForm();
    document.getElementById('gpsType').value = type;
    if (type !== 'Business') {
      document.getElementById('gpsCustomName').value = customName || '';
      document.getElementById('gpsCustomNameGroup').style.display = 'block';
    } else {
      document.getElementById('gpsCustomNameGroup').style.display = 'none';
    }
    document.getElementById('gpsForm').style.display = 'block';
  }

  function resetGPSForm() {
    document.getElementById('gpsType').value = 'Residence';
    document.getElementById('gpsCustomName').value = '';
    document.getElementById('gpsCustomNameGroup').style.display = 'none';
    document.getElementById('gpsLat').value = '';
    document.getElementById('gpsLng').value = '';
    document.getElementById('gpsStatus').innerHTML = '';
    gpsCurrentLat = null; gpsCurrentLng = null; gpsCurrentAccuracy = null;
  }

  async function captureGPS() {
    if (!navigator.geolocation) { document.getElementById('gpsStatus').innerHTML = '❌ Geolocation not supported'; return; }
    document.getElementById('gpsStatus').innerHTML = '📍 Acquiring GPS...';
    navigator.geolocation.getCurrentPosition(
      pos => {
        gpsCurrentLat = pos.coords.latitude;
        gpsCurrentLng = pos.coords.longitude;
        gpsCurrentAccuracy = pos.coords.accuracy;
        document.getElementById('gpsLat').value = gpsCurrentLat.toFixed(6);
        document.getElementById('gpsLng').value = gpsCurrentLng.toFixed(6);
        if (gpsCurrentAccuracy > 100) {
          document.getElementById('gpsStatus').innerHTML = `⚠️ Low accuracy (${gpsCurrentAccuracy.toFixed(1)}m). Move to open area and retry.`;
        } else {
          document.getElementById('gpsStatus').innerHTML = `✅ Coordinates locked (accuracy ${gpsCurrentAccuracy.toFixed(1)}m)`;
        }
      },
      err => { document.getElementById('gpsStatus').innerHTML = `❌ Error: ${err.message}`; },
      { enableHighAccuracy: true, timeout: 15000 }
    );
  }

  async function saveGPSRecord() {
    const type = document.getElementById('gpsType').value;
    let customName = document.getElementById('gpsCustomName').value.trim();
    if ((type === 'Residence' || type === 'Collateral') && !customName) {
      alert('Please provide a custom name for this location.');
      return;
    }
    if (gpsCurrentLat === null || gpsCurrentLng === null) {
      alert('Please capture your current GPS location first.');
      return;
    }
    if (gpsCurrentAccuracy > 100) {
      if (!confirm(`GPS accuracy is low (${gpsCurrentAccuracy.toFixed(1)}m). Continue anyway?`)) return;
    }
    try {
      if (gpsEditingType) {
        await callBackend('updateGPSRecord', {
          cifId: currentCIF,
          type: type,
          oldName: gpsEditingOldName,
          newName: customName,
          lat: gpsCurrentLat,
          lng: gpsCurrentLng
        });
        alert('Location updated!');
      } else {
        await callBackend('saveGPSRecord', {
          cifId: currentCIF,
          type: type,
          name: customName,
          lat: gpsCurrentLat,
          lng: gpsCurrentLng
        });
        alert('Location saved!');
      }
      closeGPSModal();
      loadGPSData();
    } catch(e) { alert('Save failed: ' + e.message); }
  }

  function attachGPSFormEvents() {
    document.getElementById('gpsCaptureBtn').onclick = captureGPS;
    document.getElementById('gpsSaveBtn').onclick = saveGPSRecord;
    document.getElementById('gpsCancelFormBtn').onclick = () => { document.getElementById('gpsForm').style.display = 'none'; };
    document.getElementById('gpsType').onchange = function() {
      document.getElementById('gpsCustomNameGroup').style.display = (this.value !== 'Business') ? 'block' : 'none';
    };
  }

  // ========== INIT ==========
  window.onload = () => {
    loadCustomerList();
    attachGPSFormEvents();
    // Optional: load dashboard view container only if needed
    if (!document.getElementById('view-dashboard')) {
      const div = document.createElement('div');
      div.id = 'view-dashboard';
      div.className = 'view hidden';
      div.innerHTML = '<div class="content" id="dashboard-content"></div>';
      document.querySelector('main').appendChild(div);
    }
  };
  window.onoffline = () => document.getElementById('offlineBanner').classList.remove('hidden');
  window.ononline = () => document.getElementById('offlineBanner').classList.add('hidden');
</script>
</body>
</html>
