<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#1A3B5C">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <title>Behind Schedule | Overdue Report View System</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --primary: #1A3B5C; --primary-light: #2A5A8C; --accent-gold: #C9A227;
      --bg-light: #F4F7FC; --surface-white: #FFFFFF; --text-primary: #0A1929;
      --text-muted: #5A6E8A; --border-light: #E2E8F0; --danger: #E53E3E;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04); --radius-lg: 18px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg-light); margin: 0; padding-bottom: 84px; }
    .hidden { display: none !important; }
    .content { padding: 0 20px; max-width: 1280px; margin: 0 auto; }
    header { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); padding: 16px 24px; position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .app-title { font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--primary-light)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .dashboard-icon { cursor: pointer; padding: 8px 16px; background: rgba(26,59,92,0.04); border-radius: 40px; display: flex; align-items: center; gap: 6px; }
    .customer-header { background: white; border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow-sm); }
    .name-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .cust-name { font-size: 28px; font-weight: 700; margin: 0; }
    .inline-status { display: flex; gap: 8px; }
    .st-icon { padding: 4px 12px; border-radius: 40px; font-size: 12px; font-weight: 600; }
    .st-act-pass { background: #0B753D; color: white; }
    .st-act-wl { background: #F5A623; color: black; }
    .st-act-npa { background: #E53E3E; color: white; }
    .st-prob-pass { background: #6EBA9A; }
    .st-prob-wl { background: #FCE3A4; }
    .st-prob-npa { background: #F5A0A0; }
    .header-actions { display: flex; gap: 12px; margin-left: auto; }
    .action-icon { cursor: pointer; padding: 8px; background: #f0f0f0; border-radius: 30px; }
    .group-badge { background: rgba(26,59,92,0.06); padding: 6px 14px; border-radius: 40px; cursor: pointer; }
    .grid-summary { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: white; border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-sm); }
    .stat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .stat-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
    .stat-value { font-size: 24px; font-weight: 800; }
    .table-wrapper { overflow-x: auto; background: white; border-radius: var(--radius-lg); }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th, td { padding: 14px; text-align: left; border-bottom: 1px solid var(--border-light); }
    th { background: #F8FAFD; font-weight: 700; }
    .search-input { width: 100%; padding: 16px 20px; border-radius: 60px; border: 1px solid var(--border-light); font-size: 16px; }
    .search-result-item { background: white; border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px; cursor: pointer; display: flex; justify-content: space-between; box-shadow: var(--shadow-sm); }
    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid var(--border-light); padding: 8px 0; z-index: 20; }
    .nav-item { flex: 1; text-align: center; cursor: pointer; font-size: 12px; color: var(--text-muted); }
    .nav-item.active { color: var(--primary); font-weight: 600; }
    .filter-chip { background: #F0F4FA; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
    .filter-chip.active { background: var(--primary); color: white; }
    .pagination { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
    .pagination button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; }
    #loader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .spinner { width: 40px; height: 40px; border: 3px solid #ddd; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .offline-banner { background: var(--danger); color: white; text-align: center; padding: 8px; font-size: 12px; }
    .location-card { background: white; border-radius: 12px; padding: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow-sm); }
    .loc-icon { font-size: 28px; }
    .loc-info { flex: 1; }
    .loc-name { font-weight: 600; }
    .loc-coords { font-size: 11px; color: var(--text-muted); }
    .loc-actions { display: flex; gap: 8px; }
    .icon-btn { background: none; border: none; font-size: 20px; cursor: pointer; }
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-box { background: white; border-radius: 24px; padding: 24px; width: 90%; max-width: 400px; }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px; }
    .form-input, .form-select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border-light); }
    .btn-primary { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 40px; cursor: pointer; width: 100%; }
    .btn-secondary { background: #eee; border: none; padding: 12px; border-radius: 40px; cursor: pointer; width: 100%; }
    .flex-buttons { display: flex; gap: 10px; margin-top: 16px; }
    @media (max-width: 640px) { .grid-summary { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>
<div id="loader" class="hidden"><div class="spinner"></div></div>
<div id="offlineBanner" class="offline-banner hidden">⚠️ You are offline. Showing cached data.</div>

<header>
  <div class="app-title">🏦 Behind Schedule</div>
  <div class="dashboard-icon" onclick="navTo('dashboard')">📊 Dashboard</div>
</header>

<main>
  <!-- Search View -->
  <div id="view-search" class="view">
    <div style="padding:20px;"><input type="text" id="searchInp" class="search-input" placeholder="🔍 Search by name or CIF..."></div>
    <div id="results" class="content"></div>
  </div>

  <!-- Detail View -->
  <div id="view-detail" class="view hidden">
    <div class="content" style="padding-top:20px;">
      <div class="customer-header">
        <div class="name-row">
          <h2 id="det-name" class="cust-name"></h2>
          <div id="det-status" class="inline-status"></div>
          <div class="header-actions">
            <span class="action-icon" onclick="openShareModal()">📤</span>
            <span class="action-icon" onclick="openReminderPopup()">🔔</span>
            <span class="action-icon" onclick="openGPS()">🌐</span>
          </div>
        </div>
        <div class="header-sub" style="margin-top:12px;">
          <div id="det-id" class="cust-id"></div>
          <div id="det-group-tag" class="group-badge" onclick="navTo('group')"></div>
        </div>
      </div>
      <div class="grid-summary" id="summary-cards"></div>
      <div class="section-title"><strong>📞 Contact Information</strong></div>
      <div class="grid-summary" id="contact-grid"></div>
      <div class="section-title"><strong>💰 Loan Portfolio</strong></div>
      <div class="table-wrapper" id="loan-table"></div>
    </div>
  </div>

  <!-- Group View -->
  <div id="view-group" class="view hidden">
    <div class="content" id="group-content" style="padding-top:20px;"></div>
  </div>

  <!-- Insights View -->
  <div id="view-insights" class="view hidden">
    <div class="content" id="insights-content" style="padding-top:20px;"></div>
  </div>

  <!-- Dashboard View -->
  <div id="view-dashboard" class="view hidden">
    <div class="content" id="dashboard-content" style="padding-top:20px;"></div>
  </div>

  <!-- GPS View -->
  <div id="view-gps" class="view hidden">
    <div class="content" style="padding-top:20px;">
      <div class="customer-header" style="margin-bottom:16px;">
        <div><strong id="gpsCustName">Loading...</strong><br><span id="gpsCustCif"></span></div>
      </div>
      <div id="gpsLocationList"></div>
      <button class="btn-primary" style="position:fixed; bottom:90px; right:20px; width:auto; border-radius:50%; padding:12px; font-size:24px;" onclick="showAddGPSDialog()">+</button>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <div class="nav-item active" id="n-search" onclick="navTo('search')">🔍 Search</div>
  <div class="nav-item" id="n-detail" onclick="navTo('detail')">📋 Summary</div>
  <div class="nav-item" id="n-group" onclick="navTo('group')">👥 Group</div>
  <div class="nav-item" id="n-insights" onclick="navTo('insights')">📈 Insights</div>
  <div class="nav-item" id="n-gps" onclick="navTo('gps')">📍 GPS</div>
</nav>

<!-- Modals -->
<div id="shareModal" class="modal hidden"><div class="modal-box"><div class="modal-title">Share Account</div><textarea id="sharePreview" rows="3" readonly></textarea><div class="flex-buttons"><button class="btn-primary" onclick="copyAccountInfo()">Copy</button><button class="btn-secondary" onclick="closeShareModal()">Close</button></div></div></div>
<div id="reminderModal" class="modal hidden"><div class="modal-box"><div class="modal-title">Send Reminder</div><select id="remLang"><option value="EN">English</option><option value="NP">Nepali</option></select><textarea id="remPreview" rows="3" readonly></textarea><div class="flex-buttons"><button class="btn-primary" onclick="sendReminderViaWhatsApp()">WhatsApp</button><button class="btn-secondary" onclick="closeReminder()">Close</button></div></div></div>
<div id="gpsModal" class="modal hidden"><div class="modal-box"><div class="modal-title" id="gpsModalTitle">Record Location</div><div class="form-group"><label class="form-label">Type</label><select id="gpsLocType" class="form-select"><option value="Business">Business</option><option value="Residence">Residence</option><option value="Collateral">Collateral</option></select></div><div id="gpsCustomNameGroup" class="form-group"><label class="form-label">Custom Name</label><input id="gpsCustomName" class="form-input" placeholder="e.g., Village Home"></div><div class="form-group"><label class="form-label">Coordinates</label><div style="display:flex; gap:8px;"><input id="gpsLat" class="form-input" placeholder="Latitude" readonly><input id="gpsLng" class="form-input" placeholder="Longitude" readonly></div><button class="btn-primary" style="margin-top:8px;" onclick="captureGPS()">📍 Get Current Location</button><span id="gpsStatus" style="font-size:12px;"></span></div><div class="flex-buttons"><button class="btn-secondary" onclick="closeGPSModal()">Cancel</button><button class="btn-primary" onclick="saveGPSLocation()">Save</button></div></div></div>

<script>
  // ========== CONFIGURATION ==========
  // Replace with your actual Apps Script deployment URL
  const API_BASE = 'https://script.google.com/macros/s/AKfycbx4Nl5MJm9UjkSskwRAfZmMnN6M5MTtabLuvb5_b48tvnov06LKfrGv_-KRCBjXaBDw/exec';
  
  let customers = [];
  let currentCIF = null;
  let currentGroup = "";
  let currentCustomerData = {};
  let gpsRecords = [];
  let gpsSelectedRecord = null;
  
  const fAmt = (n) => '₹ ' + (Math.abs(n) < 0.01 ? "0.00" : Number(n).toLocaleString('en-IN', {minimumFractionDigits:2}));
  const toggleLoader = (show) => document.getElementById('loader').classList.toggle('hidden', !show);
  
  // ========== API CALLER ==========
  async function callBackend(action, params = {}) {
    const url = new URL(API_BASE);
    url.searchParams.append('action', action);
    Object.keys(params).forEach(k => {
      if (params[k] !== undefined && params[k] !== null) {
        if (Array.isArray(params[k])) url.searchParams.append(k, JSON.stringify(params[k]));
        else url.searchParams.append(k, params[k]);
      }
    });
    console.log(`Calling ${action}`, params);
    const resp = await fetch(url.toString());
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    return data;
  }
  
  // ========== CUSTOMER LIST & SEARCH ==========
  async function loadCustomerList() {
    toggleLoader(true);
    try {
      const data = await callBackend('customers');
      customers = data;
      localStorage.setItem('crm_customers', JSON.stringify(data));
      renderSearchResults(customers);
    } catch (err) {
      console.error(err);
      const cached = localStorage.getItem('crm_customers');
      if (cached) {
        customers = JSON.parse(cached);
        renderSearchResults(customers);
        alert('Using cached customer list (offline)');
      } else alert('Failed to load customers. Check network and API_BASE.');
    }
    toggleLoader(false);
  }
  
  function renderSearchResults(list) {
    const container = document.getElementById('results');
    if (!list.length) { container.innerHTML = '<div class="search-result-item">No customers</div>'; return; }
    container.innerHTML = list.map(c => `<div class="search-result-item" data-cif="${c.id}"><div><strong>${c.name}</strong><br><small>CIF: ${c.id}</small></div><span>➡️</span></div>`).join('');
    document.querySelectorAll('.search-result-item').forEach(el => {
      el.addEventListener('click', () => {
        currentCIF = el.getAttribute('data-cif');
        navTo('detail');
      });
    });
  }
  
  function setupSearch() {
    document.getElementById('searchInp').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      if (!term) { renderSearchResults(customers); return; }
      const filtered = customers.filter(c => c.name.toLowerCase().includes(term) || c.id.includes(term));
      renderSearchResults(filtered);
    });
  }
  
  // ========== NAVIGATION ==========
  function navTo(view) {
    if (view !== 'search' && view !== 'dashboard' && !currentCIF && view !== 'gps') {
      alert('Please select a customer first');
      return;
    }
    document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
    document.getElementById(`view-${view}`).classList.remove('hidden');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`n-${view}`).classList.add('active');
    
    if (view === 'detail') loadCustomerDetails();
    if (view === 'group') loadGroupDetails();
    if (view === 'insights') loadInsights();
    if (view === 'dashboard') loadDashboard();
    if (view === 'gps') loadGPSData();
  }
  
  // ========== CUSTOMER DETAILS ==========
  async function loadCustomerDetails() {
    if (!currentCIF) return;
    toggleLoader(true);
    try {
      let data = await callBackend('metrics', { cifId: currentCIF });
      renderCustomerDetails(data);
      localStorage.setItem(`crm_metrics_${currentCIF}`, JSON.stringify(data));
    } catch (err) {
      const cached = localStorage.getItem(`crm_metrics_${currentCIF}`);
      if (cached) renderCustomerDetails(JSON.parse(cached));
      else alert('Failed to load customer details');
    }
    toggleLoader(false);
  }
  
  function renderCustomerDetails(m) {
    document.getElementById('det-name').innerText = m.CUSTOMER_NAME;
    document.getElementById('det-id').innerHTML = `🆔 CIF: ${m.CIF_ID}`;
    currentGroup = m.CUSTOMER_GROUP || "NO GROUP";
    const groupElem = document.getElementById('det-group-tag');
    if (currentGroup !== "NO GROUP") {
      groupElem.innerHTML = `👥 ${currentGroup}`;
      groupElem.style.display = 'inline-flex';
    } else groupElem.style.display = 'none';
    
    const statusHtml = `<div class="st-icon st-act-${m.CATEGORY_ACTUAL.toLowerCase()}">${m.CATEGORY_ACTUAL}</div><div class="st-icon st-prob-${m.CATEGORY_PROBABLE.toLowerCase()}">${m.CATEGORY_PROBABLE}</div>`;
    document.getElementById('det-status').innerHTML = statusHtml;
    
    const summaryHtml = `
      <div class="stat-card"><div class="stat-header">💰 Net Overdue</div><div class="stat-value">${fAmt(m.TOTAL_OVERDUE_NET)}</div></div>
      <div class="stat-card"><div class="stat-header">📊 Total Overdue</div><div class="stat-value">${fAmt(m.TOT_OVD_AMT)}</div></div>
      <div class="stat-card"><div class="stat-header">🛡️ NPA Saver</div><div class="stat-value">${fAmt(m.MIN_BAL_NPA)}</div></div>
      <div class="stat-card"><div class="stat-header">📅 OVD Days</div><div class="stat-value">${m.MAX_OVD_DAYS}</div></div>
      <div class="stat-card"><div class="stat-header">🏦 Total Loan</div><div class="stat-value">${fAmt(m.OUTSTANDING_LOAN)}</div></div>
      <div class="stat-card"><div class="stat-header">🔄 Renewal</div><div class="stat-value">${m.RENEWAL}</div></div>
    `;
    document.getElementById('summary-cards').innerHTML = summaryHtml;
    
    let loanHtml = '<table><thead><tr><th>Scheme / Account</th><th>Outstanding</th><th>Rate</th><th>Net Overdue</th></tr></thead><tbody>';
    m.accounts.forEach(acc => {
      loanHtml += `<tr><td><strong>${acc.SCHEME}</strong><br><small>${acc.ACCOUNT_NO}</small></td><td>${fAmt(acc.OUTSTANDING_LOAN)}</td><td>${acc.FULL_RATE}%</td><td style="color:red">${fAmt(acc.NET_OVD)}</td></tr>`;
    });
    loanHtml += '</tbody></table>';
    document.getElementById('loan-table').innerHTML = loanHtml;
    
    callBackend('extraDetails', { cifId: currentCIF }).then(contact => {
      if (contact) {
        currentCustomerData = { name: m.CUSTOMER_NAME, account: contact.OP_ACCOUNT, primaryPhone: contact.Contact_No, secondaryPhone: contact.Additional_Contact_Number };
        document.getElementById('contact-grid').innerHTML = `
          <div class="stat-card"><div class="stat-header">📞 Primary</div><div>${contact.Contact_Person_Name || ''}<br>${contact.Contact_No || '-'}</div></div>
          <div class="stat-card"><div class="stat-header">📞 Secondary</div><div>${contact.Additional_Person || ''}<br>${contact.Additional_Contact_Number || '-'}</div></div>
        `;
      }
    }).catch(() => {});
  }
  
  // ========== GROUP ==========
  async function loadGroupDetails() {
    if (!currentGroup || currentGroup === "NO GROUP") { document.getElementById('group-content').innerHTML = '<div class="stat-card">No group info</div>'; return; }
    toggleLoader(true);
    try {
      const data = await callBackend('group', { groupName: currentGroup });
      let html = `<div class="stat-card"><strong>${data.summary.groupName}</strong><br>Units: ${data.summary.unitCount}<br>Total Loan: ${fAmt(data.summary.totalLoan)}<br>Net Overdue: ${fAmt(data.summary.totalNetOvd)}</div>`;
      data.units.forEach(u => { html += `<div class="stat-card"><strong>${u.name}</strong><br>Net Overdue: ${fAmt(u.totalNetOvd)}<br>Actual: ${u.actual} | Probable: ${u.probable}</div>`; });
      document.getElementById('group-content').innerHTML = html;
    } catch(e) { document.getElementById('group-content').innerHTML = '<div class="stat-card">Error loading group</div>'; }
    toggleLoader(false);
  }
  
  // ========== INSIGHTS ==========
  async function loadInsights() {
    toggleLoader(true);
    try {
      const ovd = await callBackend('overdue', { cifId: currentCIF });
      let html = '<table><thead><tr><th>Date</th><th>Total OVD</th></tr></thead><tbody>';
      ovd.rows.forEach(r => { html += `<tr><td>${r.OVD_DATE}</td><td>${fAmt(r.TOT_OVD_AMT)}</td></tr>`; });
      html += `<tr><td><strong>Total</strong></td><td><strong>${fAmt(ovd.total.TOT_OVD_AMT)}</strong></td></tr></tbody></table>`;
      document.getElementById('insights-content').innerHTML = html;
    } catch(e) { document.getElementById('insights-content').innerHTML = '<div class="stat-card">Error loading insights</div>'; }
    toggleLoader(false);
  }
  
  // ========== DASHBOARD ==========
  let dashboardPage = 1;
  async function loadDashboard() {
    toggleLoader(true);
    try {
      const data = await callBackend('customersByCategory', { category: 'ALL', relationship: 'ALL', sortBy: 'name', sortOrder: 'asc', page: dashboardPage, pageSize: 10 });
      let html = '<table><thead><tr><th>SN</th><th>Customer Name</th><th>Limit</th></tr></thead><tbody>';
      data.customers.forEach((c, idx) => {
        html += `<tr class="dashboard-row" data-cif="${c.cifId}"><td>${(dashboardPage-1)*10+idx+1}</td><td style="color:var(--primary); cursor:pointer;">${c.name}</td><td>${fAmt(c.limit)}</td></tr>`;
      });
      html += '</tbody></table><div class="pagination"><button onclick="dashboardPrev()">Prev</button><span>Page ' + dashboardPage + ' of ' + data.totalPages + '</span><button onclick="dashboardNext()">Next</button></div>';
      document.getElementById('dashboard-content').innerHTML = html;
      document.querySelectorAll('.dashboard-row').forEach(row => {
        row.addEventListener('click', () => {
          currentCIF = row.getAttribute('data-cif');
          navTo('detail');
        });
      });
    } catch(e) { document.getElementById('dashboard-content').innerHTML = '<div class="stat-card">Error loading dashboard</div>'; }
    toggleLoader(false);
  }
  function dashboardPrev() { if(dashboardPage>1) { dashboardPage--; loadDashboard(); } }
  function dashboardNext() { dashboardPage++; loadDashboard(); }
  
  // ========== GPS MODULE ==========
  async function loadGPSData() {
    if (!currentCIF) { alert('No customer selected'); return; }
    toggleLoader(true);
    try {
      const info = await callBackend('getCustomerInfo', { cifId: currentCIF });
      document.getElementById('gpsCustName').innerText = info.name;
      document.getElementById('gpsCustCif').innerText = `CIF: ${info.cifId}`;
      const records = await callBackend('getGPSData', { cifId: currentCIF });
      gpsRecords = records;
      renderGPSList(records);
    } catch(e) { alert('GPS data error: ' + e.message); }
    toggleLoader(false);
  }
  
  function renderGPSList(records) {
    const container = document.getElementById('gpsLocationList');
    if (!records.length) { container.innerHTML = '<div class="empty-state">No GPS locations</div>'; return; }
    container.innerHTML = records.map((rec, idx) => {
      let icon = rec.type === 'Residence' ? '🏠' : (rec.type === 'Collateral' ? '📍' : '🏢');
      return `
        <div class="location-card">
          <div class="loc-icon">${icon}</div>
          <div class="loc-info">
            <div class="loc-name">${rec.customName || rec.type}</div>
            <div class="loc-coords">${rec.lat.toFixed(5)}, ${rec.lng.toFixed(5)}</div>
          </div>
          <div class="loc-actions">
            <button class="icon-btn" onclick="openMaps(${rec.lat},${rec.lng})">🗺️</button>
            <button class="icon-btn" onclick="editGPSLocation(${idx})">✏️</button>
          </div>
        </div>`;
    }).join('');
  }
  
  function openMaps(lat, lng) { window.open(`https://www.google.com/maps/search/?api=1&query=${lat},${lng}`, '_blank'); }
  
  function showAddGPSDialog() {
    gpsSelectedRecord = null;
    document.getElementById('gpsModalTitle').innerText = 'Record New Location';
    document.getElementById('gpsLocType').value = 'Business';
    document.getElementById('gpsCustomName').value = '';
    document.getElementById('gpsLat').value = '';
    document.getElementById('gpsLng').value = '';
    document.getElementById('gpsCustomNameGroup').style.display = 'block';
    document.getElementById('gpsLocType').disabled = false;
    document.getElementById('gpsModal').classList.remove('hidden');
  }
  
  function editGPSLocation(idx) {
    gpsSelectedRecord = gpsRecords[idx];
    document.getElementById('gpsModalTitle').innerText = 'Update Location';
    document.getElementById('gpsLocType').value = gpsSelectedRecord.type;
    document.getElementById('gpsLocType').disabled = true;
    document.getElementById('gpsCustomName').value = gpsSelectedRecord.customName || '';
    document.getElementById('gpsLat').value = gpsSelectedRecord.lat;
    document.getElementById('gpsLng').value = gpsSelectedRecord.lng;
    document.getElementById('gpsCustomNameGroup').style.display = (gpsSelectedRecord.type === 'Business') ? 'none' : 'block';
    document.getElementById('gpsModal').classList.remove('hidden');
  }
  
  function closeGPSModal() {
    document.getElementById('gpsModal').classList.add('hidden');
    document.getElementById('gpsLocType').disabled = false;
    gpsSelectedRecord = null;
  }
  
  async function captureGPS() {
    if (!navigator.geolocation) { alert('Geolocation not supported'); return; }
    document.getElementById('gpsStatus').innerText = 'Acquiring...';
    navigator.geolocation.getCurrentPosition(
      pos => {
        document.getElementById('gpsLat').value = pos.coords.latitude.toFixed(6);
        document.getElementById('gpsLng').value = pos.coords.longitude.toFixed(6);
        document.getElementById('gpsStatus').innerText = `Accuracy: ${pos.coords.accuracy.toFixed(1)}m`;
      },
      err => { document.getElementById('gpsStatus').innerText = 'Failed: ' + err.message; alert('GPS error'); },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }
  
  async function saveGPSLocation() {
    const type = document.getElementById('gpsLocType').value;
    const customName = document.getElementById('gpsCustomName').value.trim();
    const lat = parseFloat(document.getElementById('gpsLat').value);
    const lng = parseFloat(document.getElementById('gpsLng').value);
    if (isNaN(lat) || isNaN(lng)) { alert('Capture GPS coordinates first'); return; }
    if ((type === 'Residence' || type === 'Collateral') && !customName) { alert('Please provide a name for this location'); return; }
    try {
      if (gpsSelectedRecord) {
        await callBackend('updateGPSRecord', {
          cifId: currentCIF,
          type: type,
          oldName: gpsSelectedRecord.customName || '',
          newName: customName,
          lat: lat,
          lng: lng
        });
      } else {
        await callBackend('saveGPSRecord', {
          cifId: currentCIF,
          type: type,
          name: customName,
          lat: lat,
          lng: lng
        });
      }
      closeGPSModal();
      await loadGPSData();
    } catch(e) { alert('Save failed: ' + e.message); }
  }
  
  // ========== SHARE & REMINDER ==========
  function openShareModal() { if(!currentCustomerData.name) { alert('Load customer first'); return; } document.getElementById('sharePreview').value = `Customer: ${currentCustomerData.name}\nAccount: ${currentCustomerData.account}`; document.getElementById('shareModal').classList.remove('hidden'); }
  function closeShareModal() { document.getElementById('shareModal').classList.add('hidden'); }
  function copyAccountInfo() { navigator.clipboard.writeText(document.getElementById('sharePreview').value); alert('Copied'); closeShareModal(); }
  
  function openReminderPopup() { document.getElementById('reminderModal').classList.remove('hidden'); updateReminderPreview(); }
  function closeReminder() { document.getElementById('reminderModal').classList.add('hidden'); }
  function updateReminderPreview() {
    const lang = document.getElementById('remLang').value;
    const isExpired = (currentCustomerData.renewal || '').toUpperCase() === 'EXPIRED';
    const text = lang === 'NP' ? (isExpired ? 'कृपया बक्यौता र नवीकरण गर्नुहोस्' : 'कृपया भुक्तानी गर्नुहोस्') : (isExpired ? 'Please clear dues and renew your loan' : 'Your payment is overdue. Please settle.');
    document.getElementById('remPreview').value = text;
  }
  function sendReminderViaWhatsApp() {
    const phone = currentCustomerData.primaryPhone;
    if (!phone) { alert('No phone number'); return; }
    const text = encodeURIComponent(document.getElementById('remPreview').value);
    const cleanPhone = phone.replace(/[^0-9]/g, '');
    const fullPhone = cleanPhone.startsWith('977') ? cleanPhone : '977' + cleanPhone;
    window.open(`https://wa.me/${fullPhone}?text=${text}`, '_blank');
  }
  
  // ========== GPS ENTRY FROM DETAIL ==========
  function openGPS() {
    if (!currentCIF) { alert('Select a customer first'); return; }
    navTo('gps');
  }
  
  // ========== INIT ==========
  window.onload = async () => {
    await loadCustomerList();
    setupSearch();
    // Ensure all views exist (they do)
    console.log('App ready');
  };
  
  window.onoffline = () => document.getElementById('offlineBanner').classList.remove('hidden');
  window.ononline = () => document.getElementById('offlineBanner').classList.add('hidden');
</script>
</body>
</html>
